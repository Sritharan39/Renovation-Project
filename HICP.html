<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Room + Exterior — 2/56B | Final Shop Version</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,700&family=Outfit:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0F0D0A;--bg2:#1A1610;--white:#F5F1EC;--muted:#8A7A60;--border:rgba(255,255,255,0.08);--gold:#C8A020;--gold-l:#E0BC40}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--white);font-family:'Outfit',sans-serif;min-height:100vh;overflow-x:hidden}
.header{padding:0 24px;height:54px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:rgba(8,6,4,0.95);position:sticky;top:0;z-index:200;backdrop-filter:blur(12px)}
.logo{font-family:'Playfair Display',serif;font-size:1rem;color:var(--white)}
.logo em{color:var(--gold-l);font-style:italic}
.htabs{display:flex;border:1px solid var(--border);border-radius:7px;overflow:hidden}
.htab{padding:7px 18px;background:transparent;border:none;cursor:pointer;font-family:'Outfit',sans-serif;font-size:0.68rem;letter-spacing:1px;text-transform:uppercase;color:var(--muted);transition:all .2s;font-weight:500}
.htab.active{background:var(--gold);color:#0a0806;font-weight:700}
.hbtn{padding:6px 14px;border-radius:6px;font-family:'Outfit',sans-serif;font-size:0.66rem;letter-spacing:1px;text-transform:uppercase;cursor:pointer;font-weight:500;background:transparent;border:1px solid var(--border);color:var(--muted);transition:all .2s}
.hbtn:hover{border-color:rgba(255,255,255,0.25);color:var(--white)}
.view{display:none}.view.active{display:block}

/* LAYOUTS FIX - GRID SEPARATED */
.int-layout{display:grid;grid-template-columns:178px 1fr 280px;height:calc(100vh - 54px)}
.ext-layout{display:grid;grid-template-columns:1fr 300px;height:calc(100vh - 54px)}

.rpanel{background:var(--bg2);border-right:1px solid var(--border);padding:14px 8px;overflow-y:auto}
.plabel{font-size:0.56rem;letter-spacing:3px;text-transform:uppercase;color:rgba(255,255,255,0.2);margin-bottom:10px;padding-left:5px;font-family:'JetBrains Mono',monospace}
.rbtn{width:100%;padding:9px 9px;border-radius:7px;border:1px solid transparent;background:transparent;cursor:pointer;display:flex;align-items:center;gap:8px;margin-bottom:3px;transition:all .2s;text-align:left;font-family:'Outfit',sans-serif}
.rbtn:hover{background:rgba(255,255,255,0.04)}
.rbtn.active{background:rgba(200,160,32,0.12);border-color:rgba(200,160,32,0.3)}
.rbtn-icon{font-size:1rem;flex-shrink:0}
.rbtn-name{font-size:0.76rem;font-weight:500;color:rgba(245,241,236,0.7);flex:1;text-align:left}
.rbtn.active .rbtn-name{color:var(--gold-l)}
.rdiv{height:1px;background:var(--border);margin:5px 3px}

/* CENTER PANEL */
.cpanel, .escene{background:var(--bg);display:flex;flex-direction:column;overflow:hidden}
.cbar, .etop{padding:11px 18px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);flex-shrink:0;gap:10px}
.rname, .etitle{font-family:'Playfair Display',serif;font-size:1.25rem;color:var(--white);line-height:1}
.etitle small{display:block;font-size:0.58rem;font-family:'Outfit',sans-serif;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:2px}
.rsub{font-size:0.6rem;color:var(--muted);margin-top:2px;letter-spacing:.4px}
.cbar-r{display:flex;flex-direction:column;align-items:flex-end;gap:5px}

/* TABS & PAIRING */
.wtabs{display:flex;gap:3px}
.wtab{padding:5px 10px;border-radius:5px;border:1px solid var(--border);background:transparent;cursor:pointer;font-family:'Outfit',sans-serif;font-size:0.6rem;letter-spacing:.5px;color:var(--muted);transition:all .2s;font-weight:500}
.wtab:hover{border-color:rgba(255,255,255,0.2);color:var(--white)}
.wtab.active{background:var(--gold);border-color:var(--gold);color:#0a0806;font-weight:700}
.pair-row{display:flex;align-items:center;gap:7px;font-size:0.64rem;color:var(--muted)}
.pair-row input{cursor:pointer;accent-color:var(--gold)}
.pair-row label{cursor:pointer}
.pair-row label:hover{color:var(--white)}

/* 3D SCENE */
.scene-wrap, .esvg{flex:1;display:flex;align-items:center;justify-content:center;padding:14px 18px;overflow:hidden}
.scene-svg, .esvg svg{width:100%;max-width:650px}
.scene-svg svg, .esvg svg{width:100%;display:block;filter:drop-shadow(0 14px 44px rgba(0,0,0,0.6))}
.wall-poly{cursor:pointer}

/* STRIPS */
.wstrip{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;padding:0 14px 10px;flex-shrink:0}
.wcard{background:var(--bg2);border:1px solid var(--border);border-radius:7px;padding:8px 10px;cursor:pointer;transition:all .18s}
.wcard:hover{border-color:rgba(255,255,255,0.15)}
.wcard.active{border-color:var(--gold);background:rgba(200,160,32,0.08)}
.wc-lbl{font-size:0.55rem;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px;font-family:'JetBrains Mono',monospace}
.wc-row{display:flex;align-items:center;gap:6px}
.wc-dot{width:17px;height:17px;border-radius:3px;flex-shrink:0;border:1px solid rgba(255,255,255,0.1);transition:background .3s}
.wc-name{font-size:0.68rem;font-weight:500;color:var(--white);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.wc-code{font-size:0.56rem;color:var(--gold);font-family:'JetBrains Mono',monospace;margin-top:1px}
.sbar{margin:0 14px 10px;padding:9px 12px;background:linear-gradient(135deg,rgba(200,160,32,0.1),rgba(200,160,32,0.04));border:1px solid rgba(200,160,32,0.18);border-radius:7px;font-size:0.68rem;color:var(--muted);line-height:1.5;flex-shrink:0}
.sbar strong{color:var(--white)}

/* EXT ZONES */
.ezstrip{padding:8px 18px;border-top:1px solid var(--border);display:flex;gap:7px;flex-shrink:0}
.ezcard{flex:1;background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:7px 9px;cursor:pointer;transition:all .18s}
.ezcard:hover{border-color:rgba(255,255,255,0.15)}
.ezcard.active{border-color:var(--gold);background:rgba(200,160,32,0.08)}
.ezlbl{font-size:0.54rem;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:3px;font-family:'JetBrains Mono',monospace}
.ezrow{display:flex;align-items:center;gap:5px}
.ezdot{width:16px;height:16px;border-radius:3px;flex-shrink:0;border:1px solid rgba(255,255,255,0.1);transition:background .3s}
.ezname{font-size:0.66rem;font-weight:500;color:var(--white);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ezcode{font-size:0.56rem;color:var(--gold);font-family:'JetBrains Mono',monospace;margin-top:1px}

/* PICKER PANEL (RIGHT) */
.ppanel, .econ{background:var(--bg2);border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.pph{padding:11px 11px 8px;border-bottom:1px solid var(--border);flex-shrink:0}
.ppht{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.pptitle{font-size:0.6rem;letter-spacing:2px;text-transform:uppercase;color:var(--muted);font-family:'JetBrains Mono',monospace}
.ppbadge{font-size:0.58rem;padding:2px 8px;border-radius:10px;background:rgba(200,160,32,0.14);color:var(--gold-l);border:1px solid rgba(200,160,32,0.22);font-weight:600}
.catrow{display:flex;gap:4px;overflow-x:auto;scrollbar-width:none;padding-bottom:5px;flex-shrink:0}
.catrow::-webkit-scrollbar{display:none}
.cchip{padding:4px 10px;border-radius:12px;border:1px solid var(--border);background:transparent;font-size:0.58rem;font-family:'Outfit',sans-serif;cursor:pointer;white-space:nowrap;transition:all .2s;color:var(--muted)}
.cchip:hover{border-color:rgba(255,255,255,0.2);color:var(--white)}
.cchip.active{background:var(--white);color:var(--bg);border-color:var(--white);font-weight:600}
.psearch{padding:5px 9px;border-bottom:1px solid var(--border);flex-shrink:0}
.psearch input{width:100%;padding:6px 10px;border:1px solid var(--border);border-radius:5px;font-family:'Outfit',sans-serif;font-size:0.7rem;background:rgba(255,255,255,0.04);color:var(--white);outline:none}
.psearch input::placeholder{color:rgba(255,255,255,0.3)}
.psearch input:focus{border-color:rgba(200,160,23,0.4)}

/* COLOR GRID - RESPONSIVE 2 PER ROW */
.cgrid-wrap{flex:1;overflow-y:auto;padding:8px}
.cgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;align-content:start;padding-bottom:20px}
.cchp{border-radius:6px;overflow:hidden;cursor:pointer;border:2px solid transparent;transition:all .18s;background:rgba(255,255,255,0.03)}
.cchp:hover{transform:translateY(-2px);box-shadow:0 4px 12px rgba(0,0,0,.4)}
.cchp.sel{border-color:var(--gold-l);box-shadow:0 0 0 1px var(--gold-l)}
.csw{height:42px;display:flex;align-items:center;justify-content:center;font-size:1rem;color:transparent;transition:all .2s}
.cchp.sel .csw{color:rgba(255,255,255,.9);text-shadow:0 1px 3px rgba(0,0,0,.6)}
.cinf{padding:6px;background:rgba(10,8,5,.75)}
.cnm{font-size:0.64rem;font-weight:600;color:var(--white);line-height:1.2;margin-bottom:2px}
.ccd{font-size:0.54rem;color:var(--muted);font-family:'JetBrains Mono',monospace}

/* EXT CONTROLS */
.tod-tabs{display:flex;border:1px solid var(--border);border-radius:6px;overflow:hidden}
.tod-btn{padding:5px 13px;background:transparent;border:none;cursor:pointer;font-family:'Outfit',sans-serif;font-size:0.6rem;letter-spacing:1px;text-transform:uppercase;color:var(--muted);transition:all .2s}
.tod-btn.on{background:var(--white);color:var(--bg);font-weight:600}
.csec{margin-bottom:18px}
.csec-t{font-size:0.58rem;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:8px;font-weight:600;font-family:'JetBrains Mono',monospace}
.sbtn{width:100%;padding:8px 11px;border-radius:7px;border:1px solid var(--border);background:transparent;cursor:pointer;display:flex;align-items:center;gap:9px;transition:all .2s;font-family:'Outfit',sans-serif;margin-bottom:5px}
.sbtn:hover{border-color:rgba(255,255,255,0.2)}
.sbtn.active{background:rgba(200,160,32,0.1);border-color:rgba(200,160,32,0.4)}
.sbv{width:28px;height:22px;border-radius:3px;overflow:hidden;display:flex;flex-direction:column;flex-shrink:0}
.sb-l{font-size:0.7rem;color:var(--white);font-weight:500}
.sb-s{font-size:0.58rem;color:var(--muted);margin-top:1px}
.bgrid{display:grid;grid-template-columns:1fr 1fr;gap:4px}
.bopt{padding:7px 8px;border-radius:6px;border:1px solid var(--border);background:transparent;cursor:pointer;transition:all .2s;text-align:center;font-family:'Outfit',sans-serif}
.bopt:hover{border-color:rgba(255,255,255,0.2)}
.bopt.active{background:rgba(200,160,32,0.1);border-color:rgba(200,160,32,0.4)}
.bi{font-size:1rem;margin-bottom:2px}
.bl{font-size:0.62rem;color:var(--white);font-weight:500}
.bs{font-size:0.54rem;color:var(--muted);margin-top:1px;line-height:1.3}
.eadv{padding:11px 13px;background:linear-gradient(135deg,rgba(200,160,32,0.08),rgba(200,160,32,0.04));border:1px solid rgba(200,160,32,0.18);border-radius:7px;font-size:0.68rem;color:var(--muted);line-height:1.6}
.eadv strong{color:var(--white)}

.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(60px);background:var(--white);color:var(--bg);padding:9px 22px;border-radius:30px;font-size:0.74rem;font-weight:600;z-index:500;transition:transform .3s;pointer-events:none;white-space:nowrap}
.toast.show{transform:translateX(-50%) translateY(0)}

::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.15);border-radius:2px}
::-webkit-scrollbar-thumb:hover{background:rgba(255,255,255,0.3)}

@media(max-width:900px){
  .int-layout,.ext-layout{grid-template-columns:1fr}
  .rpanel{display:flex;gap:4px;padding:7px;border-right:none;border-bottom:1px solid var(--border);overflow-x:auto;height:auto}
  .rbtn{flex-direction:column;min-width:56px;padding:5px 6px;text-align:center}
  .rbtn-name{font-size:0.54rem}
  .rdiv{display:none}
  .ppanel,.econ{border-left:none;border-top:1px solid var(--border);max-height:350px;overflow-y:auto}
  .wstrip{grid-template-columns:repeat(3,1fr)}
  .cgrid{grid-template-columns:repeat(2,1fr)}
}
</style>
</head>
<body>

<div class="header">
  <div class="logo">Your Home <em>3D Visualizer</em></div>
  <div class="htabs">
    <button class="htab active" onclick="sw('int')">🏠 Interior</button>
    <button class="htab" onclick="sw('ext')">🏡 Exterior</button>
  </div>
  <div style="display:flex;gap:8px">
    <button class="hbtn" onclick="doReset()">↺ Reset</button>
    <button class="hbtn" style="border-color:rgba(200,160,32,0.4);color:var(--gold-l);font-weight:700" onclick="doSummary()">📋 Download PDF</button>
  </div>
</div>

<div class="view active" id="view-int">
  <div class="int-layout">
    <div class="rpanel" id="rpanel"></div>
    <div class="cpanel">
      <div class="cbar">
        <div><div class="rname" id="rname">Loading...</div><div class="rsub" id="rsub"></div></div>
        <div class="cbar-r">
          <div class="wtabs" id="wtabs"></div>
          <div class="pair-row">
            <input type="checkbox" id="pcb" onchange="togglePair()">
            <label for="pcb">Apply same colour to <strong>opposite wall</strong></label>
          </div>
        </div>
      </div>
      <div class="scene-wrap"><div class="scene-svg" id="svg3d"></div></div>
      <div class="wstrip" id="wstrip"></div>
      <div class="sbar" id="sbar"></div>
    </div>
    
    <div class="ppanel">
      <div class="pph">
        <div class="ppht"><div class="pptitle">Paint Library</div><div class="ppbadge" id="pbadge">Wall</div></div>
        <div class="catrow" id="catrow"></div>
      </div>
      <div class="psearch"><input id="si" placeholder="Search colour or code..." oninput="fc()"></div>
      <div class="cgrid-wrap"><div class="cgrid" id="cgrid"></div></div>
    </div>
  </div>
</div>

<div class="view" id="view-ext">
  <div class="ext-layout">
    <div class="escene">
      <div class="etop">
        <div><div class="etitle"><small>Front Elevation · Street View</small>2/56B — Dado Style</div></div>
        <div style="display:flex;align-items:center;gap:10px">
          <span style="font-size:0.62rem;color:var(--muted)">Click a zone below to change colour</span>
          <div class="tod-tabs">
            <button class="tod-btn on" id="evDay" onclick="tod('day')">☀ Day</button>
            <button class="tod-btn" id="evDusk" onclick="tod('dusk')">🌆 Dusk</button>
            <button class="tod-btn" id="evNight" onclick="tod('night')">🌙 Night</button>
          </div>
        </div>
      </div>
      <div class="esvg" id="esvg"></div>
      <div class="ezstrip" id="ezstrip"></div>
    </div>
    
    <div class="econ">
      <div class="csec"><div class="csec-t">Split Position</div><div id="esplits"></div></div>
      <div class="csec"><div class="csec-t">Border Line</div><div class="bgrid" id="ebordbg"></div></div>
      
      <div class="csec" style="flex:1; display:flex; flex-direction:column; border-top:1px solid var(--border); padding-top:15px; margin-top:5px;">
        <div class="csec-t" id="eptitle" style="margin-bottom:12px; color:var(--white);">Exterior Colors</div>
        <div class="catrow" id="ext-catrow"></div>
        <div class="psearch" style="margin:5px 0;"><input id="esi" placeholder="Search exterior colour..." oninput="efc()"></div>
        <div class="cgrid-wrap" style="padding:4px 0;"><div class="cgrid" id="ext-cgrid"></div></div>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

// ─── RENDER INTERIOR ───
function renderInt(){
  const el=document.getElementById('rpanel');
  el.innerHTML='<div class="plabel">Rooms</div>';
  ROOMS.forEach((r,i)=>{
    const b=document.createElement('button');
    b.className='rbtn'+(i===ri?' active':'');
    b.innerHTML=`<span class="rbtn-icon">${r.emoji}</span><span class="rbtn-name">${r.name}</span>`;
    b.onclick=()=>{ri=i;wi=0;cat='All';pair=false;document.getElementById('si').value='';renderInt();};
    el.appendChild(b);
    if(i<ROOMS.length-1){const d=document.createElement('div');d.className='rdiv';el.appendChild(d);}
  });
  const room=R();
  document.getElementById('rname').textContent=room.emoji+' '+room.name;
  document.getElementById('rsub').textContent=room.sub;
  
  document.getElementById('wtabs').innerHTML=
    room.walls.map((w,i)=>`<button class="wtab ${i===wi?'active':''}" onclick="selW(${i})">${w.split(' ')[0]}</button>`).join('');
  document.getElementById('pcb').checked=pair;
  
  document.getElementById('svg3d').innerHTML=room3d(room,RS[room.id]);
  const wc=RS[room.id];
  
  document.getElementById('wstrip').innerHTML=room.walls.map((name,i)=>{
    const cid=wc[i];const c=cid==='TILES'?null:PAL.find(p=>p.id===cid);
    return `<div class="wcard ${i===wi?'active':''}" onclick="selW(${i})">
      <div class="wc-lbl">${name}</div>
      <div class="wc-row">
        <div class="wc-dot" style="background:${c?c.hex:'#7A6858'}"></div>
        <div style="min-width:0"><div class="wc-name">${c?c.name:'Mosaic Tiles'}</div>
        <div class="wc-code">${c?c.code:'Not painted'}</div></div>
      </div>
    </div>`;
  }).join('');
  
  document.getElementById('sbar').innerHTML=`<span style="color:var(--gold-l);margin-right:5px">💡</span>${room.suggestion}`;
  document.getElementById('pbadge').textContent=room.walls[wi];
  
  const cats=['All',...new Set(PAL.map(p=>p.cat))];
  document.getElementById('catrow').innerHTML=cats.map(c=>`<button class="cchip ${c===cat?'active':''}" onclick="selCat('${c}')">${c}</button>`).join('');
  renderColors();
}

function renderColors(){
  const room=R(),curId=RS[room.id][wi];
  if(curId==='TILES'){
    document.getElementById('cgrid').innerHTML=`<div style="grid-column:1/-1;padding:25px 12px;text-align:center;color:var(--muted);font-size:0.74rem;line-height:1.8"><div style="font-size:1.3rem;margin-bottom:7px">🎨</div>Original <strong style="color:var(--white)">mosaic tiles</strong>.<br>Not painted — tiles are the feature.<br><span style="font-size:0.63rem;opacity:0.5">Select another wall.</span></div>`;
    return;
  }
  const s=document.getElementById('si').value.toLowerCase();
  let list=PAL;
  if(cat!=='All')list=list.filter(c=>c.cat===cat);
  if(s)list=list.filter(c=>c.name.toLowerCase().includes(s)||c.code.toLowerCase().includes(s));
  
  document.getElementById('cgrid').innerHTML=list.map(c=>`
    <div class="cchp ${c.id===curId?'sel':''}" onclick="applyC('${c.id}')">
      <div class="csw" style="background:${c.hex}"></div>
      <div class="cinf"><div class="cnm">${c.name}</div><div class="ccd">${c.code}</div></div>
    </div>`).join('');
}

function selW(i){wi=i;renderInt();}
function wsvg(i){selW(i);toast(R().walls[i]+' selected');}
function togglePair(){pair=document.getElementById('pcb').checked;toast(pair?'Pair ON — opposite wall will also change':'Pair OFF');}
function selCat(c){cat=c;renderColors();}
function fc(){renderColors();}

function applyC(id){
  const room=R(),c=PAL.find(p=>p.id===id);if(!c)return;
  RS[room.id][wi]=id;
  if(pair){
    room.pairs.forEach(pg=>{
      if(pg.includes(wi)){pg.forEach(ow=>{if(ow!==wi&&RS[room.id][ow]!=='TILES')RS[room.id][ow]=id;});}
    });
  }
  renderInt();
  toast(`${room.walls[wi]}: ${c.name}${pair?' (+ paired wall)':''}`);
}

// ─── RENDER EXTERIOR ───
function renderExt(){
  document.getElementById('esvg').innerHTML=extSVG();
  document.getElementById('ezstrip').innerHTML=EXT_ZONES.map(z=>`
    <div class="ezcard ${z.id===ezone?'active':''}" onclick="selEZ('${z.id}')">
      <div class="ezlbl">${z.label}</div>
      <div class="ezrow"><div class="ezdot" style="background:${EZS[z.id]}"></div>
      <div style="min-width:0"><div class="ezname">${z.name}</div><div class="ezcode">${z.code}</div></div></div>
    </div>`).join('');
  document.getElementById('esplits').innerHTML=EXT_SPLITS.map(s=>{
    const lp=Math.round((1-s.ratio)*100),dp=Math.round(s.ratio*100);
    return `<button class="sbtn ${s.id===esplit?'active':''}" onclick="selSplit('${s.id}')">
      <div class="sbv"><div style="background:${EZS.upper};height:${lp}%"></div><div style="background:${EZS.lower};height:${dp}%"></div></div>
      <div><div class="sb-l">${s.label}</div><div class="sb-s">${s.sub}</div></div>
    </button>`;
  }).join('');
  document.getElementById('ebordbg').innerHTML=EXT_BORDS.map(b=>`
    <button class="bopt ${b.id===ebord?'active':''}" onclick="selBord('${b.id}')">
      <div class="bi">${b.icon}</div><div class="bl">${b.label}</div><div class="bs">${b.sub}</div>
    </button>`).join('');
    
  // Exterior Advanced Color Picker
  document.getElementById('eptitle').textContent=EXT_ZONES.find(z=>z.id===ezone)?.label+' Paint Selection';
  const cats=['All',...new Set(PAL.map(p=>p.cat))];
  document.getElementById('ext-catrow').innerHTML=cats.map(c=>`<button class="cchip ${c===ecat?'active':''}" onclick="selExtCat('${c}')">${c}</button>`).join('');
  renderExtColors();

  const sp=EXT_SPLITS.find(s=>s.id===esplit),bd=EXT_BORDS.find(b=>b.id===ebord);
  const sa=sp.id==='s30'?'30/70 — elegant plinth effect, most common and refined.':sp.id==='s25'?'25/75 — very subtle base accent.':sp.id==='s40'?'40/60 — strong solid base look.':'50/50 — dramatic bold equal split.';
  const ba=bd.id==='none'?'No border — cleanest modern look.':bd.id==='white'?'White line — subtle, defines transition crisply.':bd.id==='cream'?'Cream stripe — warm, traditional South Indian style.':'Stone coping — most premium, 3D architectural effect.';
  
  const zAdv=EXT_ZONES.find(z=>z.id===ezone)?.adv;
  document.getElementById('eadv').innerHTML=`<strong>Paint Suggestion:</strong><br>For ${EXT_ZONES.find(z=>z.id===ezone)?.label}, ask for <strong style="color:var(--gold-l)">${zAdv}</strong> at the shop.<br><br><strong>Style:</strong> ${sa} ${ba}`;
}

function renderExtColors(){
  const curHex=EZS[ezone];
  const s=document.getElementById('esi').value.toLowerCase();
  let list=PAL;
  if(ecat!=='All')list=list.filter(c=>c.cat===ecat);
  if(s)list=list.filter(c=>c.name.toLowerCase().includes(s)||c.code.toLowerCase().includes(s));
  
  document.getElementById('ext-cgrid').innerHTML=list.map(c=>`
    <div class="cchp ${c.hex===curHex?'sel':''}" onclick="applyExt('${c.hex}','${c.name}','${c.code}')">
      <div class="csw" style="background:${c.hex}"></div>
      <div class="cinf"><div class="cnm">${c.name}</div><div class="ccd">${c.code}</div></div>
    </div>`).join('');
}

function selExtCat(c){ecat=c;renderExtColors();}
function efc(){renderExtColors();}
function selEZ(id){ezone=id;renderExt();}
function selSplit(id){esplit=id;renderExt();}
function selBord(id){ebord=id;renderExt();}

function applyExt(h, name, code){
  const z=EXT_ZONES.find(z=>z.id===ezone);
  if(z){EZS[ezone]=h; z.hex=h; z.name=name; z.code=code;}
  renderExt(); toast('Applied to '+EXT_ZONES.find(z=>z.id===ezone)?.label);
}

function tod(t){
  dayMode=t;
  ['evDay','evDusk','evNight'].forEach(id=>document.getElementById(id).classList.remove('on'));
  document.getElementById('ev'+t.charAt(0).toUpperCase()+t.slice(1)).classList.add('on');
  renderExt();
}

function sw(v){
  vw=v;
  document.querySelectorAll('.view').forEach(e=>e.classList.remove('active'));
  document.getElementById('view-'+v).classList.add('active');
  document.querySelectorAll('.htab').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.htab').forEach(b=>{if(b.textContent.toLowerCase().includes(v.replace('int','interior')))b.classList.add('active');});
  if(v==='ext')renderExt();
}

function doReset(){
  if(vw==='int'){const r=R();RS[r.id]=[...r.colors];wi=0;pair=false;renderInt();toast('Reset to suggestions');}
  else{EXT_ZONES.forEach(z=>{EZS[z.id]=z.hex;});esplit='s30';ebord='white';dayMode='day';tod('day');renderExt();toast('Exterior reset');}
}

// ─── PDF GENERATION WITH IMAGES ───
async function doSummary(){
  if(!window.jspdf) {
    alert("PDF library loading... Please try again in 2 seconds.");
    return;
  }
  toast('Generating PDF with Snaps... Please wait.');
  
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();
  let y = 20;

  const svgToPng = (svgStr) => {
    return new Promise((resolve) => {
      const canvas = document.createElement('canvas');
      canvas.width = 800; canvas.height = 520;
      const ctx = canvas.getContext('2d');
      const img = new Image();
      img.onload = () => {
        ctx.fillStyle = "#0F0D0A";
        ctx.fillRect(0, 0, 800, 520);
        ctx.drawImage(img, 0, 0);
        resolve(canvas.toDataURL('image/png'));
      };
      img.src = 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(svgStr);
    });
  };

  doc.setFontSize(18); doc.setFont("helvetica", "bold");
  doc.text("YOUR COLOUR PLAN — 2/56B", 20, y); y += 10;
  doc.setFontSize(11); doc.setFont("helvetica", "normal");
  doc.text("Brand: Asian Paints Apcolite Premium Emulsion", 20, y); y += 6;
  doc.text("Finishes: Matte (Dark Accent Walls) | Washable/Silk (Light Base Walls)", 20, y); y += 15;

  for (const r of ROOMS) {
    if (y > 230) { doc.addPage(); y = 20; }
    
    // Auto Generate Snap
    const tempWi = wi; wi = -1; // Hide selection border for snap
    const svgStr = room3d(r, RS[r.id]);
    wi = tempWi; // Restore
    const imgData = await svgToPng(svgStr);
    
    doc.addImage(imgData, 'PNG', 115, y, 75, 48);

    doc.setFontSize(14); doc.setFont("helvetica", "bold");
    doc.text(r.name, 20, y + 5);
    
    let ty = y + 15;
    doc.setFontSize(10); doc.setFont("helvetica", "normal");
    r.walls.forEach((w, i) => {
      const cid = RS[r.id][i];
      const c = PAL.find(p => p.id === cid);
      if (c) {
        doc.setFillColor(c.hex); doc.rect(20, ty - 4, 6, 4, 'F');
        doc.setDrawColor(150); doc.rect(20, ty - 4, 6, 4, 'D');
        doc.text(`${w}: ${c.name} (${c.code})`, 30, ty);
      } else {
        doc.setDrawColor(100); doc.rect(20, ty - 4, 6, 4, 'D');
        doc.text(`${w}: Mosaic Tiles`, 30, ty);
      }
      ty += 8;
    });
    y += 60;
  }

  if (y > 230) { doc.addPage(); y = 20; }
  
  const tempMode = dayMode; dayMode = 'day';
  const extSvgStr = extSVG();
  dayMode = tempMode; 
  
  const extImgData = await svgToPng(extSvgStr);
  doc.addImage(extImgData, 'PNG', 115, y, 75, 48);

  doc.setFontSize(14); doc.setFont("helvetica", "bold");
  doc.text("EXTERIOR", 20, y + 5);
  let ty = y + 15;
  doc.setFontSize(10); doc.setFont("helvetica", "normal");
  
  EXT_ZONES.forEach(z => {
    doc.setFillColor(EZS[z.id]); doc.rect(20, ty - 4, 6, 4, 'F');
    doc.setDrawColor(150); doc.rect(20, ty - 4, 6, 4, 'D');
    doc.text(`${z.label}: ${z.name} (${z.code})`, 30, ty);
    ty += 7;
    doc.setFontSize(8); doc.setTextColor(100);
    doc.text(`Type: ${z.adv}`, 30, ty);
    doc.setFontSize(10); doc.setTextColor(0);
    ty += 7;
  });
  
  doc.save("2_56B_Colour_Plan.pdf");
  toast('PDF Downloaded Successfully!');
}

renderInt();
